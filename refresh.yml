name: Refresh Dashboard

on:
  # Run every day at 9 AM Pacific Time (17:00 UTC)
  schedule:
    - cron: '0 17 * * *'

  # Also run on every push to main (so you see updates immediately after editing)
  push:
    branches: [main]

  # Allow manual runs from the GitHub Actions tab
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to commit index.html back to repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Regenerate dashboard
        env:
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
        run: python build_v2.py

      - name: Commit updated index.html
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          # Only commit if index.html actually changed
          git diff --staged --quiet || git commit -m "Auto-refresh dashboard $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
